name: E2E Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "website/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "website/**"

jobs:
  e2e-unix:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    name: E2E (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-and-build

      - name: Install gnome-keyring (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gnome-keyring dbus-x11 libsecret-1-0 libsecret-tools

      - name: Start D-Bus & unlock keyring (Linux)
        if: runner.os == 'Linux'
        run: |
          eval "$(dbus-launch --sh-syntax)"
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"
          echo "test" | gnome-keyring-daemon --unlock --components=secrets

      - name: Run E2E tests
        run: bash test/e2e-test.sh

  e2e-windows:
    runs-on: windows-latest
    name: E2E (windows-latest)

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-and-build

      - name: Run E2E tests
        shell: pwsh
        run: ./test/e2e-test.ps1
