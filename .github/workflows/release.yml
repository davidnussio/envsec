name: Release & Publish

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Determine npm dist-tag
          if [[ "$VERSION" == *"-beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump versions in package.json files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # CLI gets the full version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/cli/package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('packages/cli/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          # Core and SDK get the same version (linked)
          for dir in packages/core packages/sdk; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('${dir}/package.json', 'utf8'));
              pkg.version = '${VERSION}';
              fs.writeFileSync('${dir}/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      - uses: ./.github/actions/setup-and-build
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Publish @envsec/core to npm
        run: pnpm -F @envsec/core publish --no-git-checks --tag ${{ steps.version.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @envsec/sdk to npm
        run: pnpm -F @envsec/sdk publish --no-git-checks --tag ${{ steps.version.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish envsec CLI to npm
        run: pnpm -F envsec publish --no-git-checks --tag ${{ steps.version.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cli/package.json packages/core/package.json packages/sdk/package.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: bump version to ${VERSION}"
          git push origin HEAD:main

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Wait for npm registry propagation
        run: sleep 30

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: davidnussio/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://registry.npmjs.org/envsec/-/envsec-${VERSION}.tgz"

          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sL -o envsec.tgz -w "%{http_code}" "$URL")
            if [ "$HTTP_CODE" = "200" ]; then
              break
            fi
            echo "Attempt $i: got HTTP $HTTP_CODE, retrying in 15s..."
            sleep 15
          done

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to download tarball after 5 attempts"
            exit 1
          fi

          SHA256=$(shasum -a 256 envsec.tgz | awk '{print $1}')
          rm envsec.tgz

          cat > Formula/envsec.rb << EOF
          class Envsec < Formula
            desc "Secure environment secrets management using native OS credential stores"
            homepage "https://github.com/davidnussio/envsec"
            url "$URL"
            sha256 "$SHA256"
            license "MIT"
            version "$VERSION"

            depends_on "node"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink libexec.glob("bin/*")
              generate_completions_from_executable(bin/"envsec", "--completions", shells: [:bash, :zsh, :fish])
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/envsec --version")
            end
          end
          EOF

          sed -i 's/^          //' Formula/envsec.rb

      - name: Commit and push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/envsec.rb
          git commit -m "envsec ${VERSION}"
          git push
